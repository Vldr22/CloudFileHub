name: CD — Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  # Сборка Docker образов и публикация в GitHub Container Registry
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Собираем и пушим образы с кэшированием слоёв через GHA cache
      - name: Build & push s3-file-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: s3-file-service.Dockerfile
          push: true
          tags: ghcr.io/vldr22/cloudfilehub/s3-file-service:latest
          cache-from: type=gha,scope=s3-file-service
          cache-to: type=gha,scope=s3-file-service,mode=max

      - name: Build & push antivirus-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: antivirus-service.Dockerfile
          push: true
          tags: ghcr.io/vldr22/cloudfilehub/antivirus-service:latest
          cache-from: type=gha,scope=antivirus-service
          cache-to: type=gha,scope=antivirus-service,mode=max

  # Деплой на VPS — запускается только после успешной сборки образов
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,REDIS_PASSWORD,ACCESS_KEY,SECRET_KEY,JWT_SECRET_KEY,ADMIN_NAME,ADMIN_PASSWORD,CORS_ALLOWED_ORIGINS,GHCR_PAT
          script: |
            set -e
            cd /opt/cloudfilehub

            # Получаем актуальные конфиги из репозитория
            git pull origin main

            # Запоминаем текущие образы на случай отката
            S3_PREV=$(docker inspect --format='{{index .RepoDigests 0}}' s3-file-service 2>/dev/null || echo "")
            AV_PREV=$(docker inspect --format='{{index .RepoDigests 0}}' antivirus-service 2>/dev/null || echo "")

            # Обновляем .env — значения берутся из env переменных, не из логов
            printf 'POSTGRES_DB=%s\n'          "$POSTGRES_DB"          > .env
            printf 'POSTGRES_USER=%s\n'        "$POSTGRES_USER"        >> .env
            printf 'POSTGRES_PASSWORD=%s\n'    "$POSTGRES_PASSWORD"    >> .env
            printf 'REDIS_PASSWORD=%s\n'       "$REDIS_PASSWORD"       >> .env
            printf 'ACCESS_KEY=%s\n'           "$ACCESS_KEY"           >> .env
            printf 'SECRET_KEY=%s\n'           "$SECRET_KEY"           >> .env
            printf 'JWT_SECRET_KEY=%s\n'       "$JWT_SECRET_KEY"       >> .env
            printf 'ADMIN_NAME=%s\n'           "$ADMIN_NAME"           >> .env
            printf 'ADMIN_PASSWORD=%s\n'       "$ADMIN_PASSWORD"       >> .env
            printf 'CORS_ALLOWED_ORIGINS=%s\n' "$CORS_ALLOWED_ORIGINS" >> .env
            chmod 600 .env

            # Логин в GHCR
            echo "$GHCR_PAT" | docker login ghcr.io -u vldr22 --password-stdin

            # Deploy
            docker-compose pull s3-file-service antivirus-service
            docker-compose up -d --remove-orphans
            
            # Сохраняем дайджесты для отката и чистим старые образы
            echo "$S3_PREV" > /tmp/s3_prev_digest
            echo "$AV_PREV" > /tmp/av_prev_digest
            docker image prune -f

      # Проверяем что сервис поднялся — до 30 попыток каждые 15 секунд
      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            MAX_RETRIES=30
            RETRY_INTERVAL=15
            URL="https://cloudfilehub.duckdns.org/api/home"

            for i in $(seq 1 $MAX_RETRIES); do
              echo "Health check attempt $i/$MAX_RETRIES..."
              if curl -sf "$URL" > /dev/null; then
                echo "Service is up!"
                exit 0
              fi
              echo "Not ready yet, waiting ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            done

            echo "Health check failed after $((MAX_RETRIES * RETRY_INTERVAL))s"
            exit 1

      # Откат на предыдущие образы если health check упал
      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/cloudfilehub

            S3_PREV=$(cat /tmp/s3_prev_digest 2>/dev/null || echo "")
            AV_PREV=$(cat /tmp/av_prev_digest 2>/dev/null || echo "")

            if [ -z "$S3_PREV" ] || [ -z "$AV_PREV" ]; then
              echo "No previous images found, skipping rollback"
              exit 0
            fi

            echo "Rolling back to previous images..."
            docker-compose stop s3-file-service antivirus-service

            docker tag "$S3_PREV" ghcr.io/vldr22/cloudfilehub/s3-file-service:latest
            docker tag "$AV_PREV" ghcr.io/vldr22/cloudfilehub/antivirus-service:latest

            docker-compose up -d s3-file-service antivirus-service
            echo "Rollback complete"